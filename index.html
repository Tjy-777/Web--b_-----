<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ステップグリーン</title>
    <link rel="icon" href="images/logo.png">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1><img src="images/logo-nobg.png" alt="ステップグリーン" class="header-logo"></h1>
    </header>

    <main>
        <div id="map-area"></div>
    </main>

    <div class="info-sheet">
        <h2>自然、公園の詳細</h2>
        </div>

    <div id="info-sheet" class="info-sheet">
    <button id="toggle-btn" class="toggle-btn">▲</button>
    
    <h2 id="park-title">自然、公園の詳細</h2> 
    
    <div id="park-details">
        <p id="park-description">ピンを選択すると、ここに詳細が表示されます。</p>
        <ul id="park-features-list" style="list-style: none; padding: 0; text-align: left; margin-top: 15px;">
            </ul>
    </div>
</div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
